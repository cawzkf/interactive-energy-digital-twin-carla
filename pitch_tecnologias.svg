<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 128" width="820" height="128" font-family="Arial, Helvetica, sans-serif">
  <rect width="820" height="128" fill="white"/>

  <!-- 8 círculos, r=40, centros em x=58,163,268,373,458,553,648,743, cy=55 -->

  <!-- ── Python ── -->
  <circle cx="58"  cy="55" r="40" fill="#306998"/>
  <text x="58"  y="48" text-anchor="middle" fill="white" font-size="26" font-weight="bold">Py</text>
  <rect x="38" y="54" width="40" height="3" rx="1" fill="#FFD43B"/>
  <text x="58"  y="110" text-anchor="middle" fill="#306998" font-size="11" font-weight="bold">Python 3</text>

  <!-- ── CARLA (carro simples) ── -->
  <circle cx="163" cy="55" r="40" fill="#1e2a3a"/>
  <!-- carroceria -->
  <rect x="138" y="52" width="50" height="16" rx="3" fill="white"/>
  <!-- teto -->
  <rect x="145" y="40" width="34" height="14" rx="4" fill="white"/>
  <!-- rodas -->
  <circle cx="149" cy="69" r="6" fill="#1e2a3a" stroke="white" stroke-width="2.5"/>
  <circle cx="177" cy="69" r="6" fill="#1e2a3a" stroke="white" stroke-width="2.5"/>
  <text x="163" y="110" text-anchor="middle" fill="#1e2a3a" font-size="11" font-weight="bold">CARLA</text>

  <!-- ── MQTT (ondas de sinal) ── -->
  <circle cx="268" cy="55" r="40" fill="#6d1f7e"/>
  <path d="M 258 42 Q 268 34 278 42" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.55"/>
  <path d="M 252 50 Q 268 36 284 50" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.78"/>
  <path d="M 246 59 Q 268 38 290 59" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="268" cy="66" r="3.5" fill="white"/>
  <text x="268" y="110" text-anchor="middle" fill="#6d1f7e" font-size="11" font-weight="bold">MQTT</text>

  <!-- ── TimescaleDB (relógio) ── -->
  <circle cx="373" cy="55" r="40" fill="#0a7ebc"/>
  <circle cx="373" cy="55" r="21" fill="none" stroke="white" stroke-width="2.5"/>
  <line x1="373" y1="55" x2="373" y2="39" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="373" y1="55" x2="385" y2="55" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="373" cy="55" r="3" fill="white"/>
  <text x="373" y="110" text-anchor="middle" fill="#0a7ebc" font-size="11" font-weight="bold">Timescale</text>

  <!-- ── Eclipse BaSyx / AAS ── -->
  <circle cx="468" cy="55" r="40" fill="#003875"/>
  <text x="468" y="51" text-anchor="middle" fill="white" font-size="17" font-weight="bold">AAS</text>
  <text x="468" y="68" text-anchor="middle" fill="#9ab" font-size="10">BaSyx v2</text>
  <text x="468" y="110" text-anchor="middle" fill="#003875" font-size="11" font-weight="bold">Eclipse BaSyx</text>

  <!-- ── OPC UA (engrenagem simples) ── -->
  <circle cx="563" cy="55" r="40" fill="#1a5276"/>
  <!-- engrenagem: anel externo + dentes como linhas -->
  <circle cx="563" cy="55" r="19" fill="none" stroke="white" stroke-width="3.5"/>
  <circle cx="563" cy="55" r="8"  fill="white"/>
  <line x1="563" y1="32" x2="563" y2="36" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <line x1="563" y1="74" x2="563" y2="78" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <line x1="540" y1="55" x2="544" y2="55" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <line x1="582" y1="55" x2="586" y2="55" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <line x1="547" y1="39" x2="550" y2="42" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <line x1="576" y1="68" x2="579" y2="71" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <line x1="579" y1="39" x2="576" y2="42" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <line x1="550" y1="68" x2="547" y2="71" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <text x="563" y="110" text-anchor="middle" fill="#1a5276" font-size="11" font-weight="bold">OPC UA</text>

  <!-- ── React + Vite (átomo) ── -->
  <circle cx="658" cy="55" r="40" fill="#1a9e9e"/>
  <ellipse cx="658" cy="55" rx="23" ry="8" fill="none" stroke="white" stroke-width="2"/>
  <ellipse cx="658" cy="55" rx="23" ry="8" fill="none" stroke="white" stroke-width="2" transform="rotate(60 658 55)"/>
  <ellipse cx="658" cy="55" rx="23" ry="8" fill="none" stroke="white" stroke-width="2" transform="rotate(120 658 55)"/>
  <circle cx="658" cy="55" r="4" fill="white"/>
  <text x="658" y="110" text-anchor="middle" fill="#1a9e9e" font-size="11" font-weight="bold">React + Vite</text>

  <!-- ── Docker (containers empilhados) ── -->
  <circle cx="758" cy="55" r="40" fill="#1a6fad"/>
  <rect x="738" y="37" width="40" height="9"  rx="2" fill="none" stroke="white" stroke-width="2"/>
  <rect x="738" y="47" width="40" height="9"  rx="2" fill="none" stroke="white" stroke-width="2"/>
  <rect x="738" y="57" width="40" height="9"  rx="2" fill="none" stroke="white" stroke-width="2"/>
  <rect x="738" y="37" width="40" height="9"  rx="2" fill="white" opacity="0.15"/>
  <rect x="738" y="47" width="40" height="9"  rx="2" fill="white" opacity="0.3"/>
  <rect x="738" y="57" width="40" height="9"  rx="2" fill="white" opacity="0.5"/>
  <text x="758" y="110" text-anchor="middle" fill="#1a6fad" font-size="11" font-weight="bold">Docker</text>
</svg>
